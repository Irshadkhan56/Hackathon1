<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">ShopEase</a>
        <div class="nav-icons">
            <button onclick="toggleTheme()">🌓</button>
        </div>
    </header>

    <div class="form-container">
        <h2>Login to your account</h2>
        <form onsubmit="login(event)">
            <div class="form-group">
                <label>Email address</label>
                <input type="email" id="login-email" required placeholder="Enter email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" required placeholder="Enter password">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%">Login</button>
        </form>
        <p class="message">Don't have an account? <a href="signup.html">Sign Up</a></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
