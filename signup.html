<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">ShopEase</a>
        <div class="nav-icons">
            <button onclick="toggleTheme()">🌓</button>
        </div>
    </header>

    <div class="form-container">
        <h2>Create an account</h2>
        <form onsubmit="signup(event)">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" required placeholder="Enter name">
            </div>
            <div class="form-group">
                <label>Email address</label>
                <input type="email" id="email" required placeholder="Enter email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="Create password">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%">Sign Up</button>
        </form>
        <p class="message">Already have an account? <a href="login.html">Login</a></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
